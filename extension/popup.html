<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JobAssist Capture</title>
  <style>
    :root {
      --bg: #FAF9F6;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #334155;
      --text-muted: #64748B;
      --indigo: #6366F1;
      --violet: #8B5CF6;
      --emerald: #10B981;
      --rose: #FB7185;
      --amber: #F59E0B;
    }
    html, body {
      width: 360px;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      font-size: 13px;
    }
    .wrap { padding: 14px 16px; }
    h1 {
      font-size: 14px; font-weight: 700; margin: 0 0 4px;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub { font-size: 11px; color: var(--text-muted); margin: 0 0 12px; }
    .url {
      font-size: 11px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; margin-bottom: 12px;
      word-break: break-all; max-height: 80px; overflow-y: auto;
    }
    button.primary {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 14px; border: 0; border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: white;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      box-shadow: 0 6px 14px rgba(99,102,241,0.28);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    button.primary:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(99,102,241,0.38); }
    button.primary:disabled { opacity: 0.6; transform: none; cursor: default; }
    .status { font-size: 12px; padding: 10px 12px; border-radius: 8px; margin-top: 10px; }
    .status.ok    { background: #ECFDF5; border: 1px solid #A7F3D0; color: #047857; }
    .status.warn  { background: #FFFBEB; border: 1px solid #FCD34D; color: #92400E; }
    .status.err   { background: #FFF1F2; border: 1px solid #FECDD3; color: #9F1239; }
    .status a    { color: inherit; }
    .row { display: flex; align-items: center; gap: 6px; }
    .endpoint {
      font-size: 11px; color: var(--text-muted); margin-top: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .endpoint input {
      flex: 1; padding: 4px 8px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 11px; color: var(--text);
      background: var(--surface);
    }
    .endpoint button {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer;
      color: var(--text);
    }
    /* dot indicator for the dev-server health check */
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.ok { background: var(--emerald); }
    .dot.err { background: var(--rose); }
    .dot.unknown { background: var(--amber); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>JobAssist Capture</h1>
    <p class="sub">Save this job posting to your local tracker.</p>
    <div class="url" id="url-preview">Loading current page…</div>
    <button class="primary" id="save-btn" disabled>
      <span id="save-label">Save to JobAssist</span>
    </button>
    <div id="status"></div>
    <div class="endpoint">
      <span class="dot unknown" id="health-dot" title="Dev-server status"></span>
      <input type="text" id="endpoint" placeholder="http://localhost:3000" />
      <button id="endpoint-save">Save</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
